<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Clone</title>
  <link rel="stylesheet" href="./css/main.css">
</head>
<body>
<div class="app">
    <!-- LEFT SIDEBAR -->
        <aside class="sidebar"> 
          <nav class="sidebar-nav">
            <ul>
              <li><a href=""><img src="./assets/icons/pins.png" alt="library"></a></li>
              <li><a href=""><img src="./assets/icons/playlists.png" alt="playlist"></a></li>
              <li><a href=""><img src="./assets/icons/likedsongs.png" alt="likedsongs"></a></li>
              <li><a href=""><img src="./assets/icons/saves.png" alt="saves"></a></li>
              <li><a href=""><img src="./assets/icons/albums.png" alt="albums"></a></li>
              <li><a href=""><img src="./assets/icons/folders.png" alt="folders"></a></li>
              <li><a href=""><img src="./assets/icons/podcasts.png" alt="podcasts"></a></li>
              <li><a href=""><img src="./assets/icons/audiobooks.png" alt="audiobooks"></a></li>
              <li><a href=""><img src="./assets/icons/artists.png" alt="artists"></a></li>
            </ul>
          </nav>
        </aside>
  <!-- MAIN AREA -->
  <div class="main-content">
    <header class="header">
      <nav class="desktop-nav">
        <ul class="leftnav">
          <li><a href="#"><img src="./assets/icons/library1.png" alt="library"></a></li>
          <li><a href="#"><img src="./assets/icons/home1.png" alt="home"></a></li>
          <li><a href="#"><img src="./assets/icons/discover1.png" alt="discover"></a></li>
          <li>
            <div class="search">
              <input type="search" class="search__input" placeholder="Search..."/>
            </div>
          </li>
        </ul>
        <ul>
          <li><a href="#"><img src="./assets/icons/bell.png" alt="bell"></a></li>
          <li><a href="#"><img src="./assets/icons/unlock.png" alt="locket"></a></li>
          <li><a href="#"><img src="./assets/icons/friends.png" alt="friends"></a></li>
          <li><a href="#"><img src="./assets/icons/settings.png" alt="settings"></a></li>
          <li><a href="#"><img src="./assets/icons/Sprite-0002 1.png" alt="search"></a></li>
        </ul>
      </nav>
    </header>
    <main class="content">
      <section class="section">


        <h2>Made For You</h2>

        <div class="cards-grid">

          <div class="card">
            <img src="assets/images/playlist1.jpg" alt="">
            <h3>Discover Weekly</h3>
            <p>Your weekly mixtape of fresh music</p>
          </div>

          <div class="card">
            <img src="assets/images/playlist2.jpg" alt="">
            <h3>Daily Mix 1</h3>
          </div>

          <div class="card">
            <img src="assets/images/playlist3.jpg" alt="">
            <h3>Daily Mix 2</h3>
          </div>

        </div>

      </section>

    </main>

  </div>


  <!-- RIGHT SIDEBAR (Friends Activity) -->
  <aside class="friends-activity">

    <div class="friends-header">
      <h3>Friends Activity</h3>
    </div>

    <ul class="friends-list">

      <li class="friend">
        <img src="assets/images/" alt="">
        <div>
          <p class="friend-name">FriendlyMusicListener</p>
          <p class="song">Goosebumps — Travis Scott</p>
        </div>
      </li>

      <li class="friend">
        <img src="assets/images/" alt="">
        <div>
          <p class="friend-name">AverageMusicEnjoyer</p>
          <p class="song">Get Lucky — Daft Punk</p>
        </div>
      </li>

      <li class="friend">
        <img src="assets/images/" alt="">
        <div>
          <p class="friend-name">MusicEnthusiast</p>
          <p class="song">Rockstar — Post Malone</p>
        </div>
      </li>

    </ul>

  </aside>


  <!-- PLAYER -->
  <footer class="player">
    <div class="player-controls">
      Player
    </div>
    <nav class="mobile-nav">
      <ul>
        <li><a href="./index.html"><img src="./assets/icons/mobile home dark.png" alt="home"></a></li>
        <li><a href="./Spotify pages/discover.html"><img src="./assets/icons/mobile discover light.png" alt="descover"></a></li>
        <li><a href="./Spotify pages/search.html"><img src="./assets/icons/mobile search light.png" alt="search"></a></li>
        <li><a href="./Spotify pages/library.html"><img src="./assets/icons/mobile library light.png" alt="Library"></a></li>
        <li><a href="./Spotify pages/profile.html"><img src="./assets/icons/mobile me light.png" alt="Me"></a></li>
      </ul>
    </nav>
  </footer>

</div>

</body>
</html>
